body:
  text: 馬王堆漢墓帛書十問釋文黃帝問於天師曰萬勿何得而行草木何得而長日月何得而明天師曰壐察天地之請陰陽為正萬勿失之而不㡭得之而贏食陰陽稽於神明食陰之道虛而五臧廣而三咎若弗能出楃食之貴靜而神風距而兩㭙參築而毋遂神風乃生五聲乃對翕吸毋過五致之口枚之心四輔所貴玄尊乃至飲毋過五口必甘昧至之五臧刑乃極退而肌膚及夫髮末毛脈乃遂陰水乃至淺坡陽炥堅蹇不死飲食賓𦡊此胃復奇之方通於神明天師之食神氣之道黃帝問於大成曰民何失而色鹿黑而蒼民何得而奏理靡曼鮮白有光大成合曰君欲練色鮮白則察觀尺汙尺汙之食方通於陰陽食蒼則蒼食黃則黃唯君所食以變五色君必食陰以為當助以柏實盛良飲走獸泉英可以却老復壯曼澤有光椄陰將眾㡭以蜚虫春員駘興坡鳴雄鳴雄有精誠能服此玉筴復生大上埶遇廱坡玉竇盛乃從之員駘送之若不埶遇置之以䵄誠能服此可以起死大成之起死食鳥精之道黃帝問於曹熬曰民何失而死何得而生曹熬答曰而取其精侍坡合氣而微動其刑能動其刑以致五聲乃入其精虛者可使充盈壯者可使久榮老者可使長生長生之稽偵用玉閉玉閉時辟神明來積積必見章玉閉堅精必使玉泉毋頃則百疾弗嬰故能長生椄陰之道必心塞葆刑氣相葆故曰壹至勿星瀉耳目葱明再至勿星音氣高陽三至勿星被革有光四至勿星脊胠不五至勿星尻脾能方壯六至勿星百脈通行七至勿星冬身失央八至勿星可以壽長九至勿星通於神明曹熬之椄陰治神氣之道黃帝問於容成曰民始蒲淳溜刑何得而生溜刑成𦡊何失而死何曳之人也有惡有好有夭有壽欲聞民氣贏屈施張之故容成合曰君若欲壽則順察天地之道天氣月盡月盈故能長生地氣歲有寒暑險易相取故地久而不腐君必察天地之請而行之以身有徵可智間雖聖人非其所能唯道者智之天地之至精生於無徵長於無刑成於無𦡊得者壽長失者夭死故善治氣槫精者以無徵為積精神泉益翕甘潞以為積飲榣泉靈尊以為經去惡好俗神乃溜刑翕氣之道必致之末精生而不厥尚下皆精塞溫安生息必探而久新氣易守宿氣為老新氣為壽善治氣者使宿氣夜散新氣朝最以徹九徼而實六府食氣有禁春辟濁陽夏辟湯風秋辟霜冬辟凌陰必去四咎乃棎息以為壽朝息之志亓出也合於天亓入也楑坡閨如臧於淵則陳氣日盡而新氣日盈則刑有云光以精為充故能久長晝息之志虖吸必微耳目葱明陰陰氣中不薈腐故身無苛央莫息之志深息長除使耳勿聞且以安𢔀云云柏安刑故能長生夜半之息也覺啎毋變侵刑探余去埶六府皆發以長為極將欲壽神必以奏理息治氣之精出死入生驩欣咪㝅以此充刑此胃槫精治氣有經務在積精精盈必寫精出必補補寫之時於卧為之出入以脩美浬軲白內成何病之有坡生有央必亓陰精屚泄百脈宛廢喜怒不時不明大道生氣去之俗人芒生乃持巫醫行年桼十刑必夭貍頌事白殺亦偒悲𢦏死生安在徹士製之實下閉精氣不屚泄心製死生孰為之敗慎守勿失長生纍迣纍迣安樂長壽長壽生於蓄積坡生之多尚察於天下播於地能者必神故能刑解明大道者亓行陵雲上自䴢榣水溜能遠𪚔登能高疾不力倦巫成柖不死巫成柖以四時為輔天地為經巫成柖與陰陽皆生陰陽不死巫成柖興相視有道之士亦如此酒食五味以志治氣目明耳葱被革有光百脈充盈陰乃盈生繇使則可以久交可以遠行故能壽長堯問於舜曰天下孰最貴舜曰生最貴堯曰治生奈何舜曰審夫陰陽堯曰人有九繳十二節皆設而居何故而陰與人具生而先身去舜曰飲食弗以謀慮弗使諱其名而匿其𦡊亓使甚多而無寬禮故興身俱生而先身死堯曰治之奈何舜曰必愛而喜之教而謀之飲而食之使其題堅強而緩事之必盬之而勿予必樂矣而勿寫材將積氣將褚行年百歲賢於往者舜之椄陰治氣之道王子巧父問彭祖曰人氣何是為精虖彭祖合曰人氣莫如竣精竣氣宛閉百脈生疾竣氣不成不能繁生故壽盡在竣竣之葆愛兼予成䦈是故道者發明唾手循辟靡腹從陰從陽必先吐陳乃翕竣氣與竣通息與竣飲食飲食完竣如養赤子赤子驕悍數起慎勿繇使則可以久交可以遠行故能壽長出入以脩美浬軲白內成何病之有坡生有央必亓陰精屚泄百脈宛廢喜怒不時不明大道生氣去之俗人芒生乃持巫醫行年桼十刑必夭貍頌事白殺亦偒悲𢦏死生安在徹士製之實下閉精氣不屚泄心製死生孰為之敗慎守勿失長生纍迣纍迣安樂長壽長壽生於蓄積坡生之多尚察於天下播於地能者必神故能刑解明大道者亓行陵雲上自䴢榣水溜能遠𪚔登能高疾不力倦巫成柖不死巫成柖以四時為輔天地為經巫成柖與陰陽皆生陰陽不死巫成柖興相視有道之士亦如此帝盤庚問於耇老曰聞子椄陰以為強翕天之精以為壽長吾將何處而道可行耇老合曰君必貴夫與身俱生而先身老者弱者使之強短者使長貧者使多暴亓事壹虛壹實治之有節一曰垂枝直脊橈尻二曰疏股動陰州三曰合疌毋聽翕氣以充𦞧四曰含亓五味飲夫泉英五曰羣精皆上翕亓大明至五而止精神日抬耇老妾陰食神氣之道禹問於師癸曰明耳目之智以治天下上均湛地下因江水至會稽之山處水十年矣今四枝不用家大糺治之奈何師癸合曰凡治正之紀必自身始血氣宜行而不行此胃歀央六極之宗也此氣血之續也筋脈之也不可廢忘也於𦞧也施於味也移道之以志動之以事非味也無以充亓中而長其節非志也無以智其中虛興實非事也無以動亓四支而移去其疾故覺侵而引陰此胃練筋信有詘此胃練骨動用必當精故泉出行此道也何迣不物禹於是飲湩酒食五味以志治氣目明耳葱被革有光百脈充盈陰乃盈生以安后姚家乃復寧師癸治神氣之道文執見齊威王威王問道焉曰人聞子大夫之博於道也人已宗廟之祠不叚其聽欲聞道之要者二三言而止文執合曰臣為道三百編而卧最為首威王曰子澤之卧時食何氏有文執合曰淳酒毒韭威王曰子之長韭何邪文執合曰后㮨半鞣草千歲者唯韭故因而命之亓受天氣也蚤亓受地氣也葆故辟聶胠者食之恒張目不蔡者食之恒明耳不聞者食之恒葱春三月食之苛疾不昌筋骨益強此胃百草之王威王曰善子之長酒何邪文執合曰酒者五穀之精氣也亓人中散溜亓人理也徹而周不胥卧而九理故以為百藥䌛威王曰善然有不如子言者夫春寫人人以韭者何其不與酒而恒與卵邪文執合曰亦可夫鷄者陽獸也發明聲葱信頭羽張者也復陰三月與韭俱徹故道者食之威王曰善子之長卧何邪文執合曰夫卧非徒生民之事也舉鳧雁鵠蕭相蚖檀魚蟞耎動之徒胥食而生者也食者胥卧而成者也夫卧使食靡宵散藥以流刑者也辟卧於食如火於金故一昔不卧百日不復食不化必如扽鞫是生甘心密墨湯劓惑故道者敬卧威王曰善人恒善莫飲而連於夜苟毋苛虖文執合曰毋芳也辟如鳴獸蚤卧蚤起莫卧莫起天者受明地者受晦道者九其事而止夫食氣譖人而黟移夜半而氣致之六極六極堅精是以內實外平痤瘻弗處癰壹不生此道之至也威王曰善王期見秦昭王問道焉曰寡人聞客食陰以為動強翕氣以為精明人何處而壽可長王期合曰必朝日月而翕其精光食松柏飲走獸泉英可以却老復莊曼澤有光夏三月去火以日爨享則神慧而葱明椄陰之道以靜為強平心如水靈路內臧款以玉筴心毋秫五音進合孰短孰長翕其神飲夫天將致之五臧欲其深臧蠪息以晨氣刑乃剛襄近水精氣淩楗久長神和內得云柏皇五臧軲白玉色重光壽參日月為天地英昭王曰善
